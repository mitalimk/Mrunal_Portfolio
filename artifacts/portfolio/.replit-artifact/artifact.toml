kind = "web"
previewPath = "/"
title = "Mrunal Kulkarni – Portfolio"
version = "1.0.0"
id = "artifacts/portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21113

[services.development]
run = "cd /home/runner/workspace/artifacts/portfolio && npm run dev"

[services.production]
build = [ "sh", "-c", "cd /home/runner/workspace/artifacts/portfolio && npm run build" ]
publicDir = "artifacts/portfolio/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21113"
